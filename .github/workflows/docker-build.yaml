name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set short git SHA as image tag
        id: vars
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ashur2k50/static-website:${{ steps.vars.outputs.sha_tag }} \
            -t ashur2k50/static-website:latest .

      - name: Scan image for vulnerabilities (Trivy)
        # Pinned to the commit SHA for v0.36.0, not a mutable tag —
        # trivy-action has previously been hit by a supply-chain compromise,
        # so pinning by SHA means a future tag takeover can't silently swap this out.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ashur2k50/static-website:${{ steps.vars.outputs.sha_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'   # set to '1' once the image is clean, to block merges on new critical CVEs

      - name: Push Docker Image
        run: |
          docker push ashur2k50/static-website:${{ steps.vars.outputs.sha_tag }}
          docker push ashur2k50/static-website:latest
