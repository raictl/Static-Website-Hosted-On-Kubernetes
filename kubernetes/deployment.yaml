apiVersion: apps/v1
kind: Deployment

metadata:
  name: static-website
  namespace: static-website

  labels:
    app: static-website
    env: dev
    owner: Ashutosh

spec:
  replicas: 2

  selector:
    matchLabels:
      app: static-website

  template:
    metadata:
      labels:
        app: static-website
        env: dev
        owner: Ashutosh

    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: website
          image: ashur2k50/static-website:latest
          ports:
          - containerPort: 8080

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx-unprivileged writes to /var/cache/nginx at runtime
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              memory: "64Mi"   # How much the container is guaranteed to get on startup
              cpu: "100m"      # 250 millicores (0.25 of a CPU core)
            limits:
              memory: "128Mi"  # The absolute max memory the container can use before getting OOMKilled
              cpu: "250m"      # The absolute max CPU the container can throttle up to

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20

          env:
          - name: APP_NAME
            valueFrom:
               configMapKeyRef:
                name: website-config
                key: APP_NAME
          - name: ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: website-config
                key: ENVIRONMENT
