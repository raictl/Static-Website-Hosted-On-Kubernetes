apiVersion: apps/v1
kind: Deployment

metadata:
  name: static-website
  namespace: static-website

  labels:
    app: static-website
    env: dev
    owner: Ashutosh

spec:
  replicas: 2

  selector:
    matchLabels:
      app: static-website

  template:
    metadata:
      labels:
        app: static-website
        env: dev
        owner: Ashutosh

    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: website
          image: ashur2k50/static-website:latest
          ports:
          - containerPort: 8080

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              memory: "96Mi"   # baseline for gunicorn + Flask at idle
              cpu: "100m"      # 250 millicores (0.25 of a CPU core)
            limits:
              memory: "256Mi"  # headroom for the memory-stress demo (up to 150MB) without an immediate OOMKill
              cpu: "300m"      # kept low on purpose: a single CPU-stress worker crosses the 70% HPA target quickly, so scaling is visible fast

          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20

          env:
          - name: APP_NAME
            valueFrom:
               configMapKeyRef:
                name: website-config
                key: APP_NAME
          - name: ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: website-config
                key: ENVIRONMENT
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
