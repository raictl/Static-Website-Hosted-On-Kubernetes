apiVersion: apps/v1
kind: Deployment

metadata:
  name: static-website
  labels:
    app: static-website

spec:
  replicas: 2

  selector:
    matchLabels:
      app: static-website
  
  template:
    metadata:
      labels:
        app: static-website
    spec:
      containers:
        - name: website
          image: ashur2k50/static-website:v1
          ports:
          - containerPort: 80
